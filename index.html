<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>精美电子明信片</title>
    <style>
        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft YaHei", "SimSun", serif;
        }

        /* 明信片主容器 */
        .postcard {
            width: 600px;
            height: 380px;
            background-color: #fffaf0; /* 象牙白 */
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            border: 1px solid #d1c1a8;
        }

        /* 中间的分割线 */
        .postcard::after {
            content: "";
            position: absolute;
            top: 10%;
            bottom: 10%;
            left: 50%;
            width: 1px;
            background: rgba(0, 0, 0, 0.1);
        }

        /* 左侧内容区：寄语 */
        .left-side {
            flex: 1;
            padding-right: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            font-size: 18px;
            line-height: 1.8;
            color: #444;
            font-style: italic;
            margin-top: 20px;
        }

        /* 右侧内容区：邮票和地址 */
        .right-side {
            flex: 1;
            padding-left: 30px;
            position: relative;
        }

        /* 邮票区域 */
        .stamp {
            width: 80px;
            height: 100px;
            border: 2px dashed #ccc;
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #eee;
            color: #999;
            font-size: 12px;
            text-align: center;
        }

        /* 地址横线 */
        .address-lines {
            margin-top: 120px;
        }

        .line {
            border-bottom: 1px solid #999;
            margin-bottom: 25px;
            height: 30px;
            color: #222;
            font-size: 16px;
            padding-left: 5px;
        }

        /* 右下角邮编 */
        .zip-code {
            position: absolute;
            bottom: 10px;
            right: 0;
            letter-spacing: 5px;
            font-weight: bold;
            color: #555;
            border: 1px solid #555;
            padding: 2px 5px;
        }

    </style>
</head>
<body>

    <div class="postcard">
        <div class="left-side">
            <div class="message">
                亲爱的朋友：<br><br>
                好久不见！展信舒颜。<br>
                在这个快节奏的时代，想用一张慢下来的明信片，为你送去一份跨越屏幕的问候。<br>
                愿你今天心情愉快。
            </div>
        </div>

        <div class="right-side">
            <div class="stamp">
                贴邮票处<br>(STAMP)
            </div>

            <div class="address-lines">
                <div class="line">收件人：诸葛先生</div>
                <div class="line">地址：云端实验室 101 号</div>
                <div class="line">备注：记得查收好心情</div>
            </div>

            <div class="zip-code">100086</div>
        </div>
    </div>

</body>
</html>
